<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(135deg, #FC96FF, #5F83C4); 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            width: 450px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
        }
        h2 { color: #333; margin-bottom: 5px; text-align: center; }
        p.welcome { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9em; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            flex: 1; padding: 12px; 
            border: 1px solid #ddd; border-radius: 8px; 
            outline: none; 
        }
        .add-btn { 
            background: #5F83C4; color: white; 
            border: none; padding: 12px 20px; 
            border-radius: 8px; cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .add-btn:hover { background: #4a6fa5; }
        ul { list-style: none; max-height: 300px; overflow-y: auto; }
        li { 
            background: #f9f9f9; padding: 12px; 
            margin-bottom: 10px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid #FC96FF;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .delete-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; border: none; background: none; font-size: 1.2em; }
        .delete-btn:hover { color: #cc0000; }
        .logout-btn { 
            width: 100%; background: #f0f0f0; 
            color: #555; padding: 10px; 
            border: none; border-radius: 8px; 
            margin-top: 20px; cursor: pointer; 
            font-weight: 600;
        }
        .empty-msg { text-align: center; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>My Tasks</h2>
        <p class="welcome">Organize your day effectively</p>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="What needs to be done?">
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>
        
        <ul id="taskList"></ul>
        
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        const token = localStorage.getItem('authToken');
        
        // Redirect immediately if no token exists
        if (!token) {
            window.location.href = 'index.html';
        }

        // 1. Fetch and display tasks from the backend
        async function loadTasks() {
            try {
                const response = await fetch('http://localhost:3000/api/tasks', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401 || response.status === 403) {
                    logout(); // Token expired or invalid
                    return;
                }

                const tasks = await response.json();
                const list = document.getElementById('taskList');
                
                if (tasks.length === 0) {
                    list.innerHTML = '<p class="empty-msg">No tasks yet. Add one above!</p>';
                    return;
                }

                list.innerHTML = tasks.map(task => `
                    <li>
                        <span>${task.title}</span>
                        <button class="delete-btn" title="Delete Task" onclick="deleteTask(${task.id})">✕</button>
                    </li>
                `).join('');
            } catch (err) {
                console.error("Error loading tasks", err);
            }
        }

        // 2. Add a new task linked to your user account
        async function addTask() {
            const input = document.getElementById('taskInput');
            const title = input.value.trim();
            
            if (!title) return;

            try {
                const response = await fetch('http://localhost:3000/api/tasks', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title: title })
                });

                if (response.ok) {
                    input.value = '';
                    loadTasks();
                }
            } catch (err) {
                console.error("Error adding task", err);
            }
        }

        // 3. Delete a task securely
        async function deleteTask(id) {
            if (!confirm("Are you sure you want to delete this task?")) return;

            try {
                const response = await fetch(`http://localhost:3000/api/tasks/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadTasks();
                }
            } catch (err) {
                console.error("Error deleting task", err);
            }
        }

        // Clear session and redirect
        function logout() {
            localStorage.removeItem('authToken');
            window.location.href = 'index.html';
        }

        // Initial fetch on page load
        loadTasks();
    </script>
</body>
</html>

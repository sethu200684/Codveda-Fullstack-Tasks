<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat - Task 2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #5F83C4; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fafafa; }
        .message { margin-bottom: 8px; padding: 8px 12px; border-radius: 15px; background: #5F83C4; color: white; width: fit-content; max-width: 80%; }
        .input-area { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; background: #5F83C4; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #4a6da8; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>Real-Time Chat</h2>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    // This connects automatically to the current host (localhost or Railway)
    const socket = io(); 

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('messageInput');

    socket.on('connect', () => {
        console.log("Connected! ID:", socket.id);
        socket.emit('join_room', 'internship-updates');
    });

    socket.on('receive_message', (data) => {
        const msgElement = document.createElement('div');
        msgElement.classList.add('message');
        msgElement.innerText = data.text;
        messagesDiv.appendChild(msgElement);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    function sendMessage() {
        const text = input.value;
        if (text.trim() !== "") {
            socket.emit('send_message', { text: text });
            input.value = '';
        }
    }

    // Allow pressing "Enter" to send
    input.addEventListener("keypress", (event) => {
        if (event.key === "Enter") sendMessage();
    });

    socket.on('notification', (data) => {
        console.log("Notification:", data.message);
    });
</script>
</body>
</html>

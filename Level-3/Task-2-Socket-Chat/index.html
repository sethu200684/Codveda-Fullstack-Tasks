<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat - Task 2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #5F83C4; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fafafa; }
        .message { margin-bottom: 8px; padding: 5px 10px; border-radius: 5px; background: #e1ffc7; width: fit-content; max-width: 80%; }
        input { width: 75%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; background: #5F83C4; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #4a6da8; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>Real-Time Chat</h2>
    <div id="messages"></div>
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<!-- Load Socket.io Client -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    // 1. Dynamic Connection Logic
    // Automatically switches between local testing and your live Railway deployment
    const socket = io(window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost" 
        ? "http://localhost:8080" 
        : "https://codveda-fullstack-tasks-production.up.railway.app"); 

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('messageInput');

    // 2. Connection Success Listener
    socket.on('connect', () => {
        console.log("Connected to WebSocket Server!");
        console.log("Your ID:", socket.id);
        // Automatically join the room once connected 
        socket.emit('join_room', 'internship-updates');
    });

    // 3. Receive Messages (Bidirectional Communication)
    socket.on('receive_message', (data) => {
        const msgElement = document.createElement('div');
        msgElement.classList.add('message');
        msgElement.innerText = data.text;
        messagesDiv.appendChild(msgElement);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // 4. Send Message Function
    function sendMessage() {
        const text = input.value;
        if (text) {
            socket.emit('send_message', { text: text });
            input.value = '';
        }
    }

    // 5. Notifications Listener (User-specific updates)
    socket.on('notification', (data) => {
        alert("New Notification: " + data.message);
    });

    // 6. Error Handling
    socket.on('connect_error', (err) => {
        console.log("Connection Error:", err.message);
    });
</script>
</body>
</html>
